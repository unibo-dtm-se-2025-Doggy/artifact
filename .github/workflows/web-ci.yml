name: lint-and-type-check

on:
  pull_request:
    branches: [dev]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run web checks
        run: ./scripts/check.sh