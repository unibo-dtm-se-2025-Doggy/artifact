name: Web CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run web checks
        run: ./scripts/check.sh