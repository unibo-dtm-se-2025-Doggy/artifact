name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-type-check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff mypy types-requests

      - name: Run ruff (linting)
        run: ruff check backend

      - name: Run ruff (formatting check)
        run: ruff format --check backend

      - name: Run mypy (type checking)
        run: mypy backend --ignore-missing-imports --explicit-package-bases || true

      - name: Check import sorting
        run: ruff check backend --select I --fix || true

  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          python -m pytest --cov=backend --cov-report=term-missing backend/tests
